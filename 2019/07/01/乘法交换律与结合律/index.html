d class="code"><pre><span class="line"><span class="meta">&#123;-# LANGUAGE GADTs         #-&#125;</span></span><br><span class="line"><span class="meta">&#123;-# LANGUAGE TypeFamilies  #-&#125;</span></span><br><span class="line"><span class="meta">&#123;-# LANGUAGE TypeOperators #-&#125;</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">module</span> Kata.AdditionCommutes</span><br><span class="line">  ( <span class="title">plusCommutes</span> ) <span class="keyword">where</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> Kata.AdditionCommutes.Definitions</span><br><span class="line">  ( <span class="type">Z</span>, <span class="type">S</span></span><br><span class="line">  , <span class="type">Natural</span>(..), <span class="type">Equal</span>(..)</span><br><span class="line">  , (:+:))</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | For any n, n = n.</span></span><br><span class="line"><span class="title">reflexive</span> :: <span class="type">Natural</span> n -&gt; <span class="type">Equal</span> n n</span><br><span class="line"><span class="title">reflexive</span> <span class="type">NumZ</span> = <span class="type">EqlZ</span></span><br><span class="line"><span class="title">reflexive</span> (<span class="type">NumS</span> n) = <span class="type">EqlS</span> $ reflexive n</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | if a = b, then b = a.</span></span><br><span class="line"><span class="title">symmetric</span> :: <span class="type">Equal</span> a b -&gt; <span class="type">Equal</span> b a</span><br><span class="line"><span class="title">symmetric</span> <span class="type">EqlZ</span> = <span class="type">EqlZ</span></span><br><span class="line"><span class="title">symmetric</span> (<span class="type">EqlS</span> a) = <span class="type">EqlS</span> $ symmetric a</span><br><span class="line"></span><br><span class="line"><span class="title">plus</span> :: <span class="type">Natural</span> a -&gt; <span class="type">Natural</span> b -&gt; <span class="type">Natural</span> (a :+: b)</span><br><span class="line"><span class="title">plus</span> <span class="type">NumZ</span> x = x</span><br><span class="line"><span class="title">plus</span> (<span class="type">NumS</span> x) a = <span class="type">NumS</span> (plus x a)</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | if a = b and b = c, then a = c.</span></span><br><span class="line"><span class="title">transitive</span> :: <span class="type">Equal</span> a b -&gt; <span class="type">Equal</span> b c -&gt; <span class="type">Equal</span> a c</span><br><span class="line"><span class="title">transitive</span> <span class="type">EqlZ</span> <span class="type">EqlZ</span> = <span class="type">EqlZ</span></span><br><span class="line"><span class="title">transitive</span> (<span class="type">EqlS</span> a) (<span class="type">EqlS</span> b) = <span class="type">EqlS</span> $ transitive a b</span><br><span class="line"></span><br><span class="line"><span class="title">nPlusZero</span> :: <span class="type">Equal</span> n n -&gt; <span class="type">Equal</span> n (n :+: <span class="type">Z</span>)</span><br><span class="line"><span class="title">nPlusZero</span> <span class="type">EqlZ</span> = <span class="type">EqlZ</span></span><br><span class="line"><span class="title">nPlusZero</span> (<span class="type">EqlS</span> n) = <span class="type">EqlS</span> $ nPlusZero n</span><br><span class="line"></span><br><span class="line"><span class="title">nPlusSm</span> :: <span class="type">Natural</span> n -&gt; <span class="type">Natural</span> m -&gt; <span class="type">Equal</span> (n :+: <span class="type">S</span> m) (<span class="type">S</span> (n :+: m))</span><br><span class="line"><span class="title">nPlusSm</span> <span class="type">NumZ</span> m = <span class="type">EqlS</span> $ reflexive m</span><br><span class="line"><span class="title">nPlusSm</span> (<span class="type">NumS</span> n) m = <span class="type">EqlS</span> $ nPlusSm n m</span><br><span class="line"></span><br><span class="line"><span class="comment">-- This is the proof that the kata requires.</span></span><br><span class="line"><span class="comment">-- | a + b = b + a</span></span><br><span class="line"><span class="title">plusCommutes</span> :: <span class="type">Natural</span> a -&gt; <span class="type">Natural</span> b -&gt; <span class="type">Equal</span> (a :+: b) (b :+: a)</span><br><span class="line"><span class="title">plusCommutes</span> n <span class="type">NumZ</span> = symmetric $ nPlusZero $ reflexive n</span><br><span class="line"><span class="title">plusCommutes</span> n (<span class="type">NumS</span> m) = transitive (nPlusSm n m) (symmetric (<span class="type">EqlS</span> $ plusCommutes m n))</span><br><span class="line"></span><br><span class="line"><span class="comment">-- For reference, here are the definitions, if you</span></span><br><span class="line"><span class="comment">-- want to copy them into an IDE:</span></span><br><span class="line"><span class="comment">&#123;-</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">-- | The natural numbers, encoded in types.</span></span><br><span class="line"><span class="comment">data Z</span></span><br><span class="line"><span class="comment">data S n</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">-- | Predicate describing natural numbers.</span></span><br><span class="line"><span class="comment">-- | This allows us to reason with `Nat`s.</span></span><br><span class="line"><span class="comment">data Natural :: * -&gt; * where</span></span><br><span class="line"><span class="comment">    NumZ :: Natural Z</span></span><br><span class="line"><span class="comment">    NumS :: Natural n -&gt; Natural (S n)</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">-- | Predicate describing equality of natural numbers.</span></span><br><span class="line"><span class="comment">data Equal :: * -&gt; * -&gt; * where</span></span><br><span class="line"><span class="comment">    EqlZ :: Equal Z Z</span></span><br><span class="line"><span class="comment">    EqlS :: Equal n m -&gt; Equal (S n) (S m)</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">-- | Peano definition of addition.</span></span><br><span class="line"><span class="comment">type family (:+:) (n :: *) (m :: *) :: *</span></span><br><span class="line"><span class="comment">type instance Z :+: m = m</span></span><br><span class="line"><span class="comment">type instance S n :+: m = S (n :+: m)</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">-&#125;</span></span><br></pre></td></tr></table></figure><figure class="highlight haskell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">&#123;-# LANGUAGE TypeOperators, TypeFamilies, GADTs #-&#125;</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">module</span> Kata.AdditionAssoc <span class="keyword">where</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> Kata.AdditionAssoc.Definitions</span><br><span class="line"></span><br><span class="line"><span class="comment">&#123;- Preloaded code, might be helpful for</span></span><br><span class="line"><span class="comment">   doing this Kata locally</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">-- | The natural numbers, encoded in types.</span></span><br><span class="line"><span class="comment">data Z</span></span><br><span class="line"><span class="comment">data S n</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">-- | Predicate describing natural numbers.</span></span><br><span class="line"><span class="comment">-- | This allows us to reason with `Nat`s.</span></span><br><span class="line"><span class="comment">data Natural :: * -&gt; * where</span></span><br><span class="line"><span class="comment">  NumZ :: Natural Z</span></span><br><span class="line"><span class="comment">  NumS :: Natural n -&gt; Natural (S n)</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">-- | Predicate describing equality of natural numbers.</span></span><br><span class="line"><span class="comment">data Equal :: * -&gt; * -&gt; * where</span></span><br><span class="line"><span class="comment">  EqlZ :: Equal Z Z</span></span><br><span class="line"><span class="comment">  EqlS :: Equal n m -&gt; Equal (S n) (S m)</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">-- | Peano definition of addition.</span></span><br><span class="line"><span class="comment">type family (:+:) (n :: *) (m :: *) :: *</span></span><br><span class="line"><span class="comment">type instance Z :+: m = m</span></span><br><span class="line"><span class="comment">type instance S n :+: m = S (n :+: m)</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">-&#125;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">-- | For any n, n = n.</span></span><br><span class="line"><span class="title">reflexive</span> :: <span class="type">Natural</span> n -&gt; <span class="type">Equal</span> n n</span><br><span class="line"><span class="title">reflexive</span> <span class="type">NumZ</span> = <span class="type">EqlZ</span></span><br><span class="line"><span class="title">reflexive</span> (<span class="type">NumS</span> n) = <span class="type">EqlS</span> $ reflexive n</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | if a = b, then b = a.</span></span><br><span class="line"><span class="title">symmetric</span> :: <span class="type">Equal</span> a b -&gt; <span class="type">Equal</span> b a</span><br><span class="line"><span class="title">symmetric</span> <span class="type">EqlZ</span> = <span class="type">EqlZ</span></span><br><span class="line"><span class="title">symmetric</span> (<span class="type">EqlS</span> a) = <span class="type">EqlS</span> $ symmetric a</span><br><span class="line"></span><br><span class="line"><span class="title">plus</span> :: <span class="type">Natural</span> a -&gt; <span class="type">Natural</span> b -&gt; <span class="type">Natural</span> (a :+: b)</span><br><span class="line"><span class="title">plus</span> <span class="type">NumZ</span> x = x</span><br><span class="line"><span class="title">plus</span> (<span class="type">NumS</span> x) a = <span class="type">NumS</span> (plus x a)</span><br><span class="line"></span><br><span class="line"><span class="comment">-- This is the proof that the kata requires.</span></span><br><span class="line"><span class="comment">-- | a + (b + c) = (a + b) + c</span></span><br><span class="line"><span class="title">plusAssoc</span> :: <span class="type">Natural</span> a -&gt; <span class="type">Natural</span> b -&gt; <span class="type">Natural</span> c -&gt; <span class="type">Equal</span> (a :+: (b :+: c)) ((a :+: b) :+: c)</span><br><span class="line"><span class="title">plusAssoc</span> <span class="type">NumZ</span> p q = reflexive (plus p q)</span><br><span class="line"><span class="title">plusAssoc</span> (<span class="type">NumS</span> n) m p = <span class="type">EqlS</span> $ plusAssoc n m p</span><br></pre></td></tr></table></figure></div></header></article></main><footer class="foot"><div class="foot-copy">&copy; 2019 DarkHighness</div></footer><script src="/js/scroller.js"></script><script src="/js/main.js"></script></body></html>
