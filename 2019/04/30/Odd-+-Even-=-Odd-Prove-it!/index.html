succ x) x₁ = even-succ (evenPlusEven x x₁)</span><br><span class="line"></span><br><span class="line">oddPlusOdd : &#123;n m : ℕ&#125; → Odd n → Odd m → Even (n + m)</span><br><span class="line">oddPlusOdd odd-one odd-one = even-succ even-zero</span><br><span class="line">oddPlusOdd odd-one (odd-succ x₁) = even-succ (oddPlusOdd odd-one x₁)</span><br><span class="line">oddPlusOdd (odd-succ x) x₁ = even-succ (oddPlusOdd x x₁)</span><br><span class="line"></span><br><span class="line">evenPlusOdd : &#123;n m : ℕ&#125; → Even n → Odd m → Odd (n + m)</span><br><span class="line">evenPlusOdd even-zero x₁ = x₁</span><br><span class="line">evenPlusOdd (even-succ x) x₁ = odd-succ (evenPlusOdd x x₁)</span><br><span class="line"></span><br><span class="line">oddPlusEven : &#123;n m : ℕ&#125; → Odd n → Even m → Odd (n + m)</span><br><span class="line">oddPlusEven odd-one even-zero = odd-one</span><br><span class="line">oddPlusEven odd-one (even-succ x₁) = odd-succ (oddPlusEven odd-one x₁)</span><br><span class="line">oddPlusEven (odd-succ x) x₁ = odd-succ (oddPlusEven x x₁)</span><br><span class="line"></span><br><span class="line">_*_ : ℕ → ℕ → ℕ</span><br><span class="line">zero * x₁ = zero</span><br><span class="line">succ x * x₁ = x₁ + x * x₁</span><br><span class="line"></span><br><span class="line">infix 20 _*_</span><br><span class="line"></span><br><span class="line">evenTimesEven : &#123;n m : ℕ&#125; → Even n → Even m → Even (n * m)</span><br><span class="line">evenTimesEven even-zero x₁ = even-zero</span><br><span class="line">evenTimesEven (even-succ x) x₁ = evenPlusEven x₁ (evenPlusEven x₁ (evenTimesEven x x₁))</span><br><span class="line"></span><br><span class="line">oddTimesOdd : &#123;n m : ℕ&#125; → Odd n → Odd m → Odd (n * m)</span><br><span class="line">oddTimesOdd odd-one x₁ = oddPlusEven x₁ even-zero</span><br><span class="line">oddTimesOdd (odd-succ x) x₁ = oddPlusEven x₁ (oddPlusOdd x₁ (oddTimesOdd x x₁))</span><br><span class="line"></span><br><span class="line">evenTimesOdd : &#123;n m : ℕ&#125; → Even n → Odd m → Even (n * m)</span><br><span class="line">evenTimesOdd even-zero x₁ = even-zero</span><br><span class="line">evenTimesOdd (even-succ x) x₁ = oddPlusOdd x₁ (oddPlusEven x₁ (evenTimesOdd x x₁))</span><br><span class="line"></span><br><span class="line">oddTimesEven : &#123;n m : ℕ&#125; → Odd n → Even m → Even (n * m)</span><br><span class="line">oddTimesEven odd-one x₁ = evenPlusEven x₁ even-zero</span><br><span class="line">oddTimesEven (odd-succ x) x₁ = evenPlusEven x₁ (evenPlusEven x₁ (oddTimesEven x x₁))</span><br></pre></td></tr></table></figure><p><code>haskell:</code></p><figure class="highlight haskell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class= ss="line"></span><br><span class="line"><span class="title">main</span> :: <span class="type">IO</span> ()</span><br><span class="line"><span class="title">main</span> = undefined</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | The natural numbers.</span></span><br><span class="line"><span class="class"><span class="keyword">data</span> <span class="type">Nat</span> = <span class="type">Z</span> | <span class="type">S</span> <span class="type">Nat</span></span></span><br><span class="line"></span><br><span class="line"><span class="comment">-- | The axioms of even numbers.</span></span><br><span class="line"><span class="class"><span class="keyword">data</span> <span class="type">Even</span> (<span class="title">a</span> :: <span class="type">Nat</span>) :: * where</span></span><br><span class="line">  <span class="comment">-- | Zero is even.</span></span><br><span class="line">  <span class="type">ZeroEven</span> :: <span class="type">Even</span> <span class="type">Z</span></span><br><span class="line">  <span class="comment">-- | If n is even, then n+2 is even.</span></span><br><span class="line">  <span class="type">NextEven</span> :: <span class="type">Even</span> n -&gt; <span class="type">Even</span> (<span class="type">S</span> (<span class="type">S</span> n))</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | The axioms of odd numbers.</span></span><br><span class="line"><span class="class"><span class="keyword">data</span> <span class="type">Odd</span> (<span class="title">a</span> :: <span class="type">Nat</span>) :: * where</span></span><br><span class="line">  <span class="comment">-- | One is odd.</span></span><br><span class="line">  <span class="type">OneOdd</span> :: <span class="type">Odd</span> (<span class="type">S</span> <span class="type">Z</span>)</span><br><span class="line">  <span class="comment">-- | If n is odd, then n+2 is odd.</span></span><br><span class="line">  <span class="type">NextOdd</span> :: <span class="type">Odd</span> n -&gt; <span class="type">Odd</span> (<span class="type">S</span> (<span class="type">S</span> n))</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | Proves that if n is even, n+1 is odd.</span></span><br><span class="line"></span><br><span class="line"><span class="comment">-- Notice how I use the axioms here.</span></span><br><span class="line"><span class="title">evenPlusOne</span> :: <span class="type">Even</span> n -&gt; <span class="type">Odd</span> (<span class="type">S</span> n)</span><br><span class="line"><span class="title">evenPlusOne</span> <span class="type">ZeroEven</span> = <span class="type">OneOdd</span></span><br><span class="line"><span class="title">evenPlusOne</span> (<span class="type">NextEven</span> n) = <span class="type">NextOdd</span> (evenPlusOne n)</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | Proves that if n is odd, n+1 is even.</span></span><br><span class="line"><span class="title">oddPlusOne</span> :: <span class="type">Odd</span> n -&gt; <span class="type">Even</span> (<span class="type">S</span> n)</span><br><span class="line"><span class="title">oddPlusOne</span> <span class="type">OneOdd</span> = <span class="type">NextEven</span> <span class="type">ZeroEven</span></span><br><span class="line"><span class="title">oddPlusOne</span> (<span class="type">NextOdd</span> n) = <span class="type">NextEven</span>(oddPlusOne n)</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | Adds two natural numbers together.</span></span><br><span class="line"><span class="comment">-- Notice how the definition pattern matches.</span></span><br><span class="line"><span class="class"><span class="keyword">type</span> <span class="keyword">family</span>   <span class="type">Add</span> (<span class="title">n</span> :: <span class="type">Nat</span>) (<span class="title">m</span> :: <span class="type">Nat</span>) :: <span class="type">Nat</span></span></span><br><span class="line"><span class="class"><span class="keyword">type</span> instance <span class="type">Add</span> <span class="type">Z</span> m = m</span></span><br><span class="line"><span class="class"><span class="keyword">type</span> instance <span class="type">Add</span> (<span class="type">S</span> <span class="title">n</span>) m = <span class="type">S</span> (<span class="type">Add</span> <span class="title">n</span> <span class="title">m</span>)</span></span><br><span class="line"></span><br><span class="line"><span class="comment">-- | Proves even + even = even</span></span><br><span class="line"><span class="comment">-- Notice how the pattern matching mirrors `Add`s definition.</span></span><br><span class="line"><span class="title">evenPlusEven</span> :: <span class="type">Even</span> n -&gt; <span class="type">Even</span> m -&gt; <span class="type">Even</span> (<span class="type">Add</span> n m)</span><br><span class="line"><span class="title">evenPlusEven</span> <span class="type">ZeroEven</span> m = m</span><br><span class="line"><span class="title">evenPlusEven</span> (<span class="type">NextEven</span> n) m = <span class="type">NextEven</span> (evenPlusEven n m)</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | Proves odd + odd = even</span></span><br><span class="line"><span class="title">oddPlusOdd</span> :: <span class="type">Odd</span> n -&gt; <span class="type">Odd</span> m -&gt; <span class="type">Even</span> (<span class="type">Add</span> n m)</span><br><span class="line"><span class="title">oddPlusOdd</span> <span class="type">OneOdd</span> <span class="type">OneOdd</span> = <span class="type">NextEven</span> <span class="type">ZeroEven</span></span><br><span class="line"><span class="title">oddPlusOdd</span> <span class="type">OneOdd</span> (<span class="type">NextOdd</span> n) = <span class="type">NextEven</span> (oddPlusOdd <span class="type">OneOdd</span> n)</span><br><span class="line"><span class="title">oddPlusOdd</span> (<span class="type">NextOdd</span> n) m = <span class="type">NextEven</span> (oddPlusOdd n m)</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | Proves even + odd = odd</span></span><br><span class="line"><span class="title">evenPlusOdd</span> :: <span class="type">Even</span> n -&gt; <span class="type">Odd</span> m -&gt; <span class="type">Odd</span> (<span class="type">Add</span> n m)</span><br><span class="line"><span class="title">evenPlusOdd</span> <span class="type">ZeroEven</span> m = m</span><br><span class="line"><span class="title">evenPlusOdd</span> (<span class="type">NextEven</span> n) m = <span class="type">NextOdd</span>(evenPlusOdd n m)</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | Proves odd + even = odd</span></span><br><span class="line"><span class="title">oddPlusEven</span> :: <span class="type">Odd</span> n -&gt; <span class="type">Even</span> m -&gt; <span class="type">Odd</span> (<span class="type">Add</span> n m)</span><br><span class="line"><span class="title">oddPlusEven</span> <span class="type">OneOdd</span> <span class="type">ZeroEven</span> = <span class="type">OneOdd</span></span><br><span class="line"><span class="title">oddPlusEven</span> <span class="type">OneOdd</span> (<span class="type">NextEven</span> n) = <span class="type">NextOdd</span> (oddPlusEven <span class="type">OneOdd</span> n)</span><br><span class="line"><span class="title">oddPlusEven</span> (<span class="type">NextOdd</span> n) m = <span class="type">NextOdd</span>(oddPlusEven n m)</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | Multiplies two natural numbers.</span></span><br><span class="line"><span class="class"><span class="keyword">type</span> <span class="keyword">family</span>   <span class="type">Mult</span> (<span class="title">n</span> :: <span class="type">Nat</span>) (<span class="title">m</span> :: <span class="type">Nat</span>) :: <span class="type">Nat</span></span></span><br><span class="line"><span class="class"><span class="keyword">type</span> instance <span class="type">Mult</span> <span class="type">Z</span> m = <span class="type">Z</span></span></span><br><span class="line"><span class="class"><span class="keyword">type</span> instance <span class="type">Mult</span> (<span class="type">S</span> <span class="title">n</span>) m = <span class="type">Add</span> m (<span class="type">Mult</span> <span class="title">n</span> <span class="title">m</span>)</span></span><br><span class="line"></span><br><span class="line"><span class="comment">-- | Proves even * even = even</span></span><br><span class="line"><span class="title">evenTimesEven</span> :: <span class="type">Even</span> n -&gt; <span class="type">Even</span> m -&gt; <span class="type">Even</span> (<span class="type">Mult</span> n m)</span><br><span class="line"><span class="title">evenTimesEven</span> <span class="type">ZeroEven</span> m = <span class="type">ZeroEven</span></span><br><span class="line"><span class="title">evenTimesEven</span> (<span class="type">NextEven</span> n) m = evenPlusEven m (evenPlusEven m (evenTimesEven n m))</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">-- | Proves odd * odd = odd</span></span><br><span class="line"><span class="title">oddTimesOdd</span> :: <span class="type">Odd</span> n -&gt; <span class="type">Odd</span> m -&gt; <span class="type">Odd</span> (<span class="type">Mult</span> n m)</span><br><span class="line"><span class="title">oddTimesOdd</span> <span class="type">OneOdd</span> m = oddPlusEven m <span class="type">ZeroEven</span></span><br><span class="line"><span class="title">oddTimesOdd</span> (<span class="type">NextOdd</span> n) m = oddPlusEven m (oddPlusOdd m (oddTimesOdd n m))</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | Proves even * odd = even</span></span><br><span class="line"><span class="title">evenTimesOdd</span> :: <span class="type">Even</span> n -&gt; <span class="type">Odd</span> m -&gt; <span class="type">Even</span> (<span class="type">Mult</span> n m)</span><br><span class="line"><span class="title">evenTimesOdd</span> <span class="type">ZeroEven</span> m = <span class="type">ZeroEven</span></span><br><span class="line"><span class="title">evenTimesOdd</span> (<span class="type">NextEven</span> n) m = oddPlusOdd m (oddPlusEven m (evenTimesOdd n m))</span><br><span class="line"></span><br><span class="line"><span class="comment">-- | Proves odd * even = even</span></span><br><span class="line"><span class="title">oddTimesEven</span> :: <span class="type">Odd</span> n -&gt; <span class="type">Even</span> m -&gt; <span class="type">Even</span> (<span class="type">Mult</span> n m)</span><br><span class="line"><span class="title">oddTimesEven</span> <span class="type">OneOdd</span> m = evenPlusEven m <span class="type">ZeroEven</span></span><br><span class="line"><span class="title">oddTimesEven</span> (<span class="type">NextOdd</span> n) m = evenPlusEven m (evenPlusEven m (oddTimesEven n m))</span><br></pre></td></tr></table></figure></div></header></article></main><footer class="foot"><div class="foot-copy">&copy; 2019 DarkHighness</div></footer><script src="/js/scroller.js"></script><script src="/js/main.js"></script></body></html>
